services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5445:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cs_assistant
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6370:6379"

  # worker:
  #   build: .
  #   command: celery -A src.config.celery worker --loglevel=info
  #   environment:
  #     DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cs_assistant
  #     REDIS_URL: redis://redis:6379/0
  #   depends_on:
  #     - postgres
  #     - redis
  #
  # Enabled once ingestion is wired up. The worker runs Celery tasks for
  # scraping and embedding documents into the vector store.

volumes:
  postgres_data:
